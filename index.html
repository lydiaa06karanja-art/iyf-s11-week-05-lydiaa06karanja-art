<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>DOM Practice</title>
    <style>
        .highlight { background-color: yellow; }
        .container { padding: 20px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <header id="main-header">
        <h1>DOM Practice</h1>
        <nav>
            <ul class="nav-list">
                <li><a href="#" class="nav-link">Home</a></li>
                <li><a href="#" class="nav-link">About</a></li>
                <li><a href="#" class="nav-link">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <article>
            <h2 class="title">Article Title</h2>
            <p class="content">This is paragraph 1</p>
            <p class="content">This is paragraph 2</p>
        </article>

        <section>
            <h2>Form Section</h2>
            <form id="contact-form">
                <input type="text" id="name" placeholder="Name">
                <input type="email" id="email" placeholder="Email">
                <button type="submit">Submit</button>
            </form>
        </section>
<style>
    .error {
  border: 2px solid red;
}
.error-message {
  color: red;
  font-size: 12px;
}
.completed {
  text-decoration: line-through;
  opacity: 0.5;
}
#taskInput, #addTaskBtn {
  margin: 5px;
  padding: 8px;
}
.delete-btn {
  margin-left: 10px;
  cursor: pointer;
}
    /* TODO APP STYLES */
#todo-app { margin-top: 40px; }
#todo-input { padding: 8px; width: 70%; }
#todo-form button { padding: 8px 12px; }

.filters { margin: 15px 0; }
.filter { 
  padding: 6px 12px; 
  margin-right: 5px; 
  border: 1px solid #ccc;
  background: white;
  cursor: pointer;
}
.filter.active { 
  background: #007bff; 
  color: white; 
  border-color: #007bff;
}

#todo-list { list-style: none; padding: 0; }
#todo-list li { 
  padding: 10px; 
  border-bottom: 1px solid #eee;
  display: flex;
  justify-content: space-between;
}
#todo-list li.completed {
  text-decoration: line-through;
  opacity: 0.5;
}

.stats { margin-top: 15px; display: flex; justify-content: space-between; }
.delete-btn { 
  background: red; 
  color: white; 
  border: none; 
  padding: 3px 8px; 
  cursor: pointer;
}
</style>
    <section id="todo-app">
      <h2>My To-Do List</h2>
      <form id="todo-form">
        <input type="text" id="todo-input" placeholder="What needs to be done?">
        <button type="submit">Add</button>
      </form>
      <div class="filters">
        <button class="filter active" data-filter="all">All</button>
        <button class="filter" data-filter="active">Active</button>
        <button class="filter" data-filter="completed">Completed</button>
      </div>
      <ul id="todo-list"></ul>
      <div class="stats">
        <span id="items-left">0 items left</span>
        <button id="clear-completed">Clear Completed</button>
      </div>
    </section>


    </main>

    <footer>
        <p>&copy; 2026</p>
    </footer>

    <script src="dom.js"></script>
</body>
</html>
